name: Create markdown indexes

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  generate-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          # Avoid this error - This repository exceeded its LFS budget. The account responsible for the budget should increase it to restore access.

#      - name: Pull Git LFS files
#        run: git lfs pull
      - name: Disable Git LFS
        run: rm .gitattributes

      - uses: gacts/directory-listing@v1
        with:
          target: ./
          # target: .
          # ignore: |
          #   build/**
          #   **/index.html
          #   node_modules/**,**/*.log
          # show-hidden: true
          # overwrite: true

      - name: Rewrite Links (Preview + Download)
        run: |
          # Define Bases
          PREVIEW_BASE="https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}"
          DIRECT_BASE="https://media.githubusercontent.com/media/${{ github.repository }}/${{ github.ref_name }}"

          # This SED command transforms:
          # <a href="./path/file.pdf">file.pdf</a>
          # INTO:
          # file.pdf: [<a href="...preview...">Preview</a>] [<a href="...direct...">Download</a>]
          
          sed -i "s|<a href=\"\./\([^\" ]*\.pdf\)\">\([^<]*\)</a>|\2: [<a href=\"$PREVIEW_BASE/\1\">Preview</a>] [<a href=\"$DIRECT_BASE/\1\">Download</a>]|g" index.html

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true # git history growth - even on non-src branches - makes cloning slow.